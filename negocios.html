<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Negócios Cheat Sheet</title>

<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
nav { background: #2c3e50; padding: 10px; margin-bottom: 20px; border-radius: 5px; }
nav a { color: white; text-decoration: none; font-weight: bold; }

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: 1px solid #ddd;
  border-radius: 5px;
  box-sizing: border-box;
  font-size: 16px;
}

table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
th { background: #34495e; color: white; position: sticky; top: 0; }
tr:nth-child(even) { background: #fafafa; }
tr:hover { background: #eef2f7; }

.setor-badge { background: #e8f0fe; color: #1a73e8; padding: 2px 8px; border-radius: 4px; font-size: 0.9em; font-weight: 500; }

.pagination-container { display: flex; justify-content: center; align-items: center; margin: 20px 0; gap: 20px; }
.pagination-btn { padding: 10px 25px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 5px; font-weight: bold; }
.pagination-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
#pageInfo { font-weight: bold; font-size: 1.1em; }
#loadingStatus { text-align: center; font-weight: bold; color: #e67e22; margin: 10px 0; }
</style>
</head>

<body>
<nav>
  <a href="index.html">🏠 Home</a>
</nav>

<h1>🤝 Negócios Cheat Sheet</h1>

<input type="text" id="search_field" placeholder="Buscar por qualquer texto..." onkeyup="handleFilterChange(true)">

<select id="filterSetor" onchange="handleFilterChange(true)">
  <option value="">Filtrar por Setor/Área</option>
</select>

<select id="filterTermo" onchange="handleFilterChange(true)">
  <option value="">Filtrar por Termo</option>
</select>

<div id="loadingStatus">Carregando dados...</div>

<table id="LeanguageTable">
  <thead>
    <tr>
      <th>Termo</th>
      <th>Setor/Área</th>
      <th>Explicação Simples</th>
      <th>Setor Econômico</th> 
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<div class="pagination-container">
  <button class="pagination-btn" id="btnPrev" onclick="changePage(-1)">⬅️ Anterior</button>
  <span id="pageInfo">Página 1</span>
  <button class="pagination-btn" id="btnNext" onclick="changePage(1)">Próxima ➡️</button>
</div>

<script>
let masterData = [];      
let filteredData = [];    
let currentPage = 1;
const itemsPerPage = 100;

const selSetor = document.getElementById("filterSetor");
const selTermo = document.getElementById("filterTermo");
const inpSearch = document.getElementById("search_field");

async function loadData() {
  try {
    const response = await fetch('data/negocios.csv');
    const buffer = await response.arrayBuffer();
    const decoder = new TextDecoder('utf-8');
    const text = decoder.decode(buffer);
    
    const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
    lines.shift(); // remove header

    masterData = lines.map(line => {
      const parts = line.split(';');
      return {
        termo: (parts[0] || "").trim(),
        setor: (parts[1] || "").trim(),
        explicacao: (parts[2] || "").trim(), 
        economico: (parts[3] || "").trim() 
      };
    });

    // Aplica filtros iniciais e atualiza dropdowns
    applyFilters();       // popula filteredData e renderiza a tabela
    updateDropdowns();    // agora atualiza os selects com base em filteredData
    
    document.getElementById('loadingStatus').style.display = 'none';
  } catch (err) {
    console.error(err);
    document.getElementById('loadingStatus').innerText = "Erro ao carregar CSV.";
  }
}

// LÓGICA DE FILTRO CRUZADO CORRIGIDA
function updateDropdowns() {
  // Usa os dados já filtrados (se houver). Caso contrário, usa o masterData.
  const source = (Array.isArray(filteredData) && filteredData.length > 0) ? filteredData : masterData;

  // Salva o que o usuário já selecionou
  const selectedSetor = selSetor.value;
  const selectedTermo = selTermo.value;

  // 1. Atualiza o Select de SETOR baseado no conjunto atual (search + termo selecionado + setor selecionado)
  const validSetores = [...new Set(
    source
      .map(item => item.setor)
      .filter(s => s) // remove strings vazias
  )];

  // 2. Atualiza o Select de TERMO baseado no conjunto atual
  const validTermos = [...new Set(
    source
      .map(item => item.termo)
      .filter(t => t)
  )];

  // Garante que a seleção atual continue visível (útil se um filtro momentaneamente retirou a opção)
  if (selectedSetor && !validSetores.includes(selectedSetor)) validSetores.push(selectedSetor);
  if (selectedTermo && !validTermos.includes(selectedTermo)) validTermos.push(selectedTermo);

  validSetores.sort((a,b) => a.localeCompare(b, 'pt-BR'));
  validTermos.sort((a,b) => a.localeCompare(b, 'pt-BR'));

  // Reconstrói as opções
  populateSelect(selSetor, validSetores, selectedSetor, "Filtrar por Setor/Área");
  populateSelect(selTermo, validTermos, selectedTermo, "Filtrar por Termo");
}

function populateSelect(selectElement, options, currentValue, defaultText) {
  let html = `<option value="">${defaultText}</option>`;
  options.forEach(opt => {
    // escape simples de aspas para evitar quebrar o HTML
    const safeOpt = opt.replace(/"/g,'&quot;');
    const isSelected = opt === currentValue ? "selected" : "";
    html += `<option value="${safeOpt}" ${isSelected}>${opt}</option>`;
  });
  selectElement.innerHTML = html;
}

function handleFilterChange(resetPage) {
  if(resetPage) currentPage = 1;
  // Primeiro aplicamos os filtros aos dados, depois atualizamos as listas dos menus
  applyFilters();
  updateDropdowns();
}

function applyFilters() {
  const search = inpSearch.value.toLowerCase();
  const setor = selSetor.value;
  const termo = selTermo.value;

  filteredData = masterData.filter(item => {
    const matchSearch = search === "" || Object.values(item).some(val => val.toLowerCase().includes(search));
    const matchSetor = !setor || item.setor === setor;
    const matchTermo = !termo || item.termo === termo;
    return matchSearch && matchSetor && matchTermo;
  });

  renderPage();
}

function renderPage() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pageItems = filteredData.slice(start, end);

  pageItems.forEach(item => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><strong>${escapeHtml(item.termo)}</strong></td>
      <td><span class="setor-badge">${escapeHtml(item.setor)}</span></td>
      <td>${escapeHtml(item.explicacao)}</td>
      <td>${escapeHtml(item.economico)}</td>
    `;
    tbody.appendChild(tr);
  });

  const totalPages = Math.max(1, Math.ceil(filteredData.length / itemsPerPage));
  document.getElementById("pageInfo").innerText = `Página ${currentPage} de ${totalPages} (${filteredData.length} itens)`;
  document.getElementById("btnPrev").disabled = currentPage === 1;
  document.getElementById("btnNext").disabled = currentPage === totalPages;
}

function changePage(step) {
  currentPage += step;
  renderPage();
  window.scrollTo(0, 0);
}

// Pequena função de escape para evitar injeção HTML
function escapeHtml(unsafe) {
  return (unsafe || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

window.onload = loadData;
</script>
</body>
</html>
